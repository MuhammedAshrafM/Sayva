#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
# WINDOWS-ROOT trust-store type lets Java see the system's CA trust anchors —
# fixes "unable to find valid certification path" against Maven Central on
# machines whose Java runtime bundles an old / incomplete cacerts.
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8 -Djavax.net.ssl.trustStoreType=WINDOWS-ROOT
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true